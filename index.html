<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>SEBASTIAN MD | MAIN MENU</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap');

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: 'Poppins', sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      position: relative;
      overflow-x: hidden;
      padding: 20px;
    }

    /* Animated background overlay */
    body::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: url('https://files.catbox.moe/2yarwr.png') repeat;
      opacity: 0.1;
      animation: slideBackground 60s linear infinite;
      z-index: 0;
    }

    @keyframes slideBackground {
      0% { transform: translate(0, 0) rotate(0deg); }
      100% { transform: translate(-50%, -50%) rotate(10deg); }
    }

    /* Floating particles */
    .particles {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      z-index: 1;
    }

    .particle {
      position: absolute;
      display: block;
      width: 20px;
      height: 20px;
      background: rgba(255, 255, 255, 0.1);
      border-radius: 50%;
      animation: float 6s ease-in-out infinite;
    }

    @keyframes float {
      0%, 100% { transform: translateY(0) rotate(0deg); }
      50% { transform: translateY(-20px) rotate(180deg); }
    }

    /* Main container */
    .container {
      position: relative;
      z-index: 10;
      max-width: 500px;
      width: 100%;
      background: rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border-radius: 40px;
      padding: 40px 30px;
      box-shadow: 0 25px 50px rgba(0, 0, 0, 0.3),
                 0 0 0 2px rgba(255, 255, 255, 0.1) inset;
      border: 1px solid rgba(255, 255, 255, 0.2);
      animation: fadeInUp 0.8s ease;
    }

    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(30px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* Header section */
    .header {
      text-align: center;
      margin-bottom: 40px;
    }

    .logo {
      width: 100px;
      height: 100px;
      background: linear-gradient(135deg, #ff6b6b, #4ecdc4);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 20px;
      font-size: 50px;
      color: white;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
      animation: pulse 2s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }

    h1 {
      color: white;
      font-size: 32px;
      font-weight: 700;
      margin-bottom: 10px;
      text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
    }

    .subtitle {
      color: rgba(255, 255, 255, 0.8);
      font-size: 14px;
      font-weight: 300;
      letter-spacing: 1px;
    }

    .subtitle i {
      color: #ff6b6b;
      margin: 0 5px;
    }

    /* Menu buttons grid */
    .menu-grid {
      display: flex;
      flex-direction: column;
      gap: 15px;
      margin-bottom: 30px;
    }

    .menu-btn {
      display: flex;
      align-items: center;
      justify-content: space-between;
      width: 100%;
      padding: 18px 25px;
      background: rgba(255, 255, 255, 0.1);
      border: 1px solid rgba(255, 255, 255, 0.2);
      border-radius: 50px;
      color: white;
      font-size: 16px;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 1px;
      cursor: pointer;
      transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      position: relative;
      overflow: hidden;
      backdrop-filter: blur(5px);
      -webkit-backdrop-filter: blur(5px);
      text-decoration: none;
      border: none;
      width: 100%;
    }

    .menu-btn::before {
      content: '';
      position: absolute;
      top: 0;
      left: -100%;
      width: 100%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.2), transparent);
      transition: left 0.5s ease;
    }

    .menu-btn:hover {
      transform: translateX(10px) scale(1.02);
      background: rgba(255, 255, 255, 0.2);
      border-color: rgba(255, 255, 255, 0.5);
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
    }

    .menu-btn:hover::before {
      left: 100%;
    }

    .menu-btn:active {
      transform: translateX(5px) scale(0.98);
    }

    .btn-icon {
      width: 40px;
      height: 40px;
      background: rgba(255, 255, 255, 0.15);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      transition: all 0.3s ease;
    }

    .menu-btn:hover .btn-icon {
      transform: rotate(360deg);
      background: rgba(255, 255, 255, 0.3);
    }

    .btn-text {
      flex: 1;
      text-align: left;
      margin-left: 15px;
      font-weight: 600;
    }

    .btn-arrow {
      opacity: 0;
      transform: translateX(-10px);
      transition: all 0.3s ease;
    }

    .menu-btn:hover .btn-arrow {
      opacity: 1;
      transform: translateX(0);
    }

    /* Button colors */
    .menu-btn:nth-child(1) .btn-icon { background: linear-gradient(135deg, #25D366, #128C7E); }
    .menu-btn:nth-child(2) .btn-icon { background: linear-gradient(135deg, #4ecdc4, #45b7d1); }
    .menu-btn:nth-child(3) .btn-icon { background: linear-gradient(135deg, #333, #24292e); }
    .menu-btn:nth-child(4) .btn-icon { background: linear-gradient(135deg, #ff6b6b, #ff8e8e); }
    .menu-btn:nth-child(5) .btn-icon { background: linear-gradient(135deg, #a8e6cf, #d4edda); }

    /* Stats section */
    .stats {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      margin-top: 30px;
      padding-top: 20px;
      border-top: 1px solid rgba(255, 255, 255, 0.2);
    }

    .stat-item {
      text-align: center;
      color: white;
    }

    .stat-number {
      font-size: 24px;
      font-weight: 700;
      background: linear-gradient(135deg, #ff6b6b, #4ecdc4);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .stat-label {
      font-size: 12px;
      opacity: 0.7;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    /* Footer */
    .footer {
      text-align: center;
      margin-top: 30px;
      color: rgba(255, 255, 255, 0.6);
      font-size: 12px;
      font-weight: 300;
    }

    .footer i {
      color: #ff6b6b;
      animation: heartbeat 1.5s ease-in-out infinite;
    }

    @keyframes heartbeat {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.1); }
    }

    /* Responsive design */
    @media (max-width: 480px) {
      .container {
        padding: 25px 15px;
      }

      h1 {
        font-size: 24px;
      }

      .menu-btn {
        padding: 15px 20px;
        font-size: 14px;
      }

      .btn-icon {
        width: 35px;
        height: 35px;
        font-size: 16px;
      }

      .stat-number {
        font-size: 20px;
      }

      .stat-label {
        font-size: 10px;
      }
    }

    /* Loading animation for buttons */
    .menu-btn.loading {
      pointer-events: none;
      opacity: 0.7;
    }

    .menu-btn.loading .btn-icon {
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }

    /* Tooltip */
    [data-tooltip] {
      position: relative;
    }

    [data-tooltip]:hover::after {
      content: attr(data-tooltip);
      position: absolute;
      bottom: 100%;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0, 0, 0, 0.8);
      color: white;
      padding: 5px 10px;
      border-radius: 5px;
      font-size: 12px;
      white-space: nowrap;
      z-index: 1000;
      margin-bottom: 5px;
    }
  </style>
</head>
<body>
  <div class="particles">
    <div class="particle" style="top: 10%; left: 10%; animation-delay: 0s;"></div>
    <div class="particle" style="top: 20%; right: 15%; animation-delay: 2s;"></div>
    <div class="particle" style="bottom: 30%; left: 20%; animation-delay: 4s;"></div>
    <div class="particle" style="bottom: 10%; right: 25%; animation-delay: 1s;"></div>
  </div>

  <div class="container">
    <div class="header">
      <div class="logo">
        <i class="fas fa-robot"></i>
      </div>
      <h1>SEBASTIAN MD</h1>
      <div class="subtitle">
        <i class="fas fa-bolt"></i> WhatsApp Bot Menu <i class="fas fa-bolt"></i>
      </div>
    </div>

    <div class="menu-grid">
      <button onclick="openWithLoading(this, 'https://chat.whatsapp.com/DTnrZzULVtP5r0E9rhoFOj')" class="menu-btn" data-tooltip="Join our community">
        <span class="btn-icon"><i class="fab fa-whatsapp"></i></span>
        <span class="btn-text">WhatsApp Group</span>
        <span class="btn-arrow"><i class="fas fa-arrow-right"></i></span>
      </button>

      <button onclick="openWithLoading(this, '/pair')" class="menu-btn" data-tooltip="Get pairing code">
        <span class="btn-icon"><i class="fas fa-code"></i></span>
        <span class="btn-text">Pair Code</span>
        <span class="btn-arrow"><i class="fas fa-arrow-right"></i></span>
      </button>

      <button onclick="openWithLoading(this, 'https://github.com/bravesebastian458-dotcom/Sebastian-Md')" class="menu-btn" data-tooltip="View source code">
        <span class="btn-icon"><i class="fab fa-github"></i></span>
        <span class="btn-text">GitHub</span>
        <span class="btn-arrow"><i class="fas fa-arrow-right"></i></span>
      </button>

      <button onclick="openWithLoading(this, 'https://wa.me/255612619717')" class="menu-btn" data-tooltip="Chat with me">
        <span class="btn-icon"><i class="fas fa-headset"></i></span>
        <span class="btn-text">Contact Me</span>
        <span class="btn-arrow"><i class="fas fa-arrow-right"></i></span>
      </button>

      <button onclick="openWithLoading(this, 'https://whatsapp.com/channel/0029Vb7LxhRGE56l9woRjd2g')" class="menu-btn" data-tooltip="Follow our channel">
        <span class="btn-icon"><i class="fas fa-tv"></i></span>
        <span class="btn-text">WA Channel</span>
        <span class="btn-arrow"><i class="fas fa-arrow-right"></i></span>
      </button>
    </div>

    <div class="stats">
      <div class="stat-item">
        <div class="stat-number">1.5k+</div>
        <div class="stat-label">Users</div>
      </div>
      <div class="stat-item">
        <div class="stat-number">50+</div>
        <div class="stat-label">Commands</div>
      </div>
      <div class="stat-item">
        <div class="stat-number">24/7</div>
        <div class="stat-label">Active</div>
      </div>
    </div>

    <div class="footer">
      <p>
        <i class="fas fa-heart"></i> Coded by Rahmany <i class="fas fa-heart"></i>
        <br>
        <span style="font-size: 10px;">© 2024 Sebastian MD. All rights reserved.</span>
      </p>
    </div>
  </div>

  <script>
    // Function to handle button clicks with loading effect
    function openWithLoading(button, url) {
      // Add loading class
      button.classList.add('loading');
      
      // Change icon to spinner
      const icon = button.querySelector('.btn-icon i');
      const originalIconClass = icon.className;
      icon.className = 'fas fa-spinner';
      
      // Simulate loading (remove loading class after navigation)
      setTimeout(() => {
        button.classList.remove('loading');
        icon.className = originalIconClass;
      }, 1000);

      // Open URL
      window.open(url, '_blank');
    }

    // Add hover sound effect (optional - uncomment to enable)
    /*
    const buttons = document.querySelectorAll('.menu-btn');
    buttons.forEach(btn => {
      btn.addEventListener('mouseenter', () => {
        const audio = new Audio();
        audio.src = 'data:audio/wav;base64,UklGRlwAAABXQVZFZm10IBAAAAABAAEAQB8AAEAfAAABAAgAZGF0YVQAAACAgICAf39/f39/f3+AgICAf39/f39/f3+AgICAf39/f39/f3+AgICAf39/f39/f3+AgICAf39/f39/f3+AgICAf39/f38=';
        audio.volume = 0.2;
        audio.play().catch(e => {});
      });
    });
    */

    // Keyboard navigation
    document.addEventListener('keydown', (e) => {
      const buttons = document.querySelectorAll('.menu-btn');
      const currentIndex = Array.from(buttons).findIndex(btn => btn === document.activeElement);
      
      if (e.key === 'ArrowDown') {
        e.preventDefault();
        const nextIndex = (currentIndex + 1) % buttons.length;
        buttons[nextIndex].focus();
      } else if (e.key === 'ArrowUp') {
        e.preventDefault();
        const prevIndex = (currentIndex - 1 + buttons.length) % buttons.length;
        buttons[prevIndex].focus();
      }
    });

    // Smooth entrance animation for stats
    const observer = new IntersectionObserver((entries) => {
      entries.forEach(entry => {
        if (entry.isIntersecting) {
          entry.target.style.opacity = '1';
          entry.target.style.transform = 'translateY(0)';
        }
      });
    });

    document.querySelectorAll('.stat-item').forEach(item => {
      item.style.opacity = '0';
      item.style.transform = 'translateY(20px)';
      item.style.transition = 'all 0.5s ease';
      observer.observe(item);
    });
  </script>
</body>
</html>
